server:
  port: 8060
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${FLIGHTS_JWT_ISSUER_URI:${IDENTITY_PROVIDER_ISSUER:http://localhost:8090}}
  application:
    name: flights
  datasource:
    url: jdbc:postgresql://localhost:5432/flights
    username: program
    password: test
    driver-class-name: org.postgresql.Driver
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${FLIGHTS_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.add.type.headers: false
        request.timeout.ms: ${FLIGHTS_KAFKA_REQUEST_TIMEOUT_MS:2000}
        delivery.timeout.ms: ${FLIGHTS_KAFKA_DELIVERY_TIMEOUT_MS:3000}
        max.block.ms: ${FLIGHTS_KAFKA_MAX_BLOCK_MS:2000}

events:
  enabled: ${FLIGHTS_EVENTS_ENABLED:true}
  service: ${FLIGHTS_EVENTS_SERVICE:flights}
  topic: ${FLIGHTS_EVENTS_TOPIC:rsoi.actions}
