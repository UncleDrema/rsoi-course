replicaCount: 1

image:
  repository: "cr.yandex/crpjocodvb4840j8jqg2/identity-provider"
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []

nameOverride: "identity-provider"
fullnameOverride: "identity-provider"

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "identity-provider"

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: NodePort
  port: 8090
  name: http
  annotations:
    gwin.yandex.cloud/targets.type: Node

auth:
  issuerUri: "http://idp.81.26.187.28.nip.io"

env:
  - name: SERVER_PORT
    value: "8090"
  - name: SPRING_APPLICATION_NAME
    value: "identity-provider"
  - name: SPRING_DATASOURCE_URL
    value: "jdbc:postgresql://postgres:5432/identity_provider"
  - name: SPRING_DATASOURCE_USERNAME
    value: "program"
  - name: SPRING_DATASOURCE_PASSWORD
    value: "test"
  - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
    value: "{{ .Values.auth.issuerUri }}"
  - name: IDENTITY_PROVIDER_ISSUER
    value: "{{ .Values.auth.issuerUri }}"
  - name: IDENTITY_PROVIDER_PUBLIC_REDIRECT_URI_1
    value: "http://81.26.187.28.nip.io/auth/callback"
  - name: IDENTITY_PROVIDER_PUBLIC_REDIRECT_URI_2
    value: "http://81.26.187.28.nip.io/auth/callback"
  - name: IDENTITY_PROVIDER_CORS_ALLOWED_ORIGINS
    value: "http://81.26.187.28.nip.io"

ingress:
  enabled: true
  className: "gwin-default"
  annotations:
    gwin.yandex.cloud/groupName: rsoi
    gwin.yandex.cloud/externalIPv4Address: auto
  hosts:
    - host: idp.81.26.187.28.nip.io
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

livenessProbe:
  httpGet:
    path: /manage/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /manage/health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2

nodeSelector: {}
tolerations: []
affinity: {}
