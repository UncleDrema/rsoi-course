name: GitHub Classroom Workflow

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  YC_REGISTRY: cr.yandex/crpjocodvb4840j8jqg2
  YC_FOLDER_ID: b1ga2j4c24npsduq8nbl
  YC_CLUSTER_ID: catt2f1j3e9rt0uam2q4
  KUBE_NAMESPACE: rsoi
  BP_JVM_VERSION: "25"

jobs:
  build:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "gradle"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/spa/package-lock.json

      - name: Make Gradle wrapper executable
        run: chmod +x services/*/gradlew

      - name: Install Yandex Cloud CLI
        run: |
          curl https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Configure Yandex Cloud
        env:
          YC_OAUTH_TOKEN: ${{ secrets.YC_OAUTH_TOKEN }}
        run: |
          yc config set token "$YC_OAUTH_TOKEN"
          yc config set folder-id "$YC_FOLDER_ID"
          yc container registry configure-docker

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Configure kubectl for Yandex Cloud
        env:
          YC_OAUTH_TOKEN: ${{ secrets.YC_OAUTH_TOKEN }}
        run: |
          yc container cluster get-credentials "$YC_CLUSTER_ID" --external --force --folder-id "$YC_FOLDER_ID"
          kubectl cluster-info
          kubectl get nodes

      - name: Build and test SPA
        working-directory: ./frontend/spa
        env:
          VITE_OIDC_AUTHORITY: ${{ vars.VITE_OIDC_AUTHORITY }}
          VITE_OIDC_CLIENT_ID: ${{ vars.VITE_OIDC_CLIENT_ID || 'spa-client' }}
          VITE_API_BASE_PATH: ${{ vars.VITE_API_BASE_PATH || '/api/v1' }}
        run: |
          if [ -z "$VITE_OIDC_AUTHORITY" ]; then
            echo "Repository variable VITE_OIDC_AUTHORITY must point to the public Identity Provider issuer URL."
            exit 1
          fi
          npm ci
          npm run check
          npm run test
          npm run build

      - name: Build and push image - Frontend
        working-directory: ./frontend/spa
        run: |
          cat > nginx.conf <<'EOF'
          server {
            listen 80;
            server_name _;
            root /usr/share/nginx/html;
            index index.html;

            location / {
              try_files $uri $uri/ /index.html;
            }
          }
          EOF

          cat > /tmp/rsoi-spa.Dockerfile <<'EOF'
          FROM nginx:1.27-alpine
          COPY nginx.conf /etc/nginx/conf.d/default.conf
          COPY dist /usr/share/nginx/html
          EOF

          IMAGE_SHA=${{ env.YC_REGISTRY }}/frontend:${{ github.sha }}
          IMAGE_LATEST=${{ env.YC_REGISTRY }}/frontend:latest
          docker build -f /tmp/rsoi-spa.Dockerfile -t "$IMAGE_SHA" .
          docker tag "$IMAGE_SHA" "$IMAGE_LATEST"
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

      - name: Build Spring image - Flights
        working-directory: ./services/flights
        run: ./gradlew --no-daemon bootBuildImage --imageName=${{ env.YC_REGISTRY }}/flights:${{ github.sha }}

      - name: Push image - Flights
        run: |
          IMAGE_SHA=${{ env.YC_REGISTRY }}/flights:${{ github.sha }}
          IMAGE_LATEST=${{ env.YC_REGISTRY }}/flights:latest
          docker tag "$IMAGE_SHA" "$IMAGE_LATEST"
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

      - name: Build Spring image - Tickets
        working-directory: ./services/tickets
        run: ./gradlew --no-daemon bootBuildImage --imageName=${{ env.YC_REGISTRY }}/tickets:${{ github.sha }}

      - name: Push image - Tickets
        run: |
          IMAGE_SHA=${{ env.YC_REGISTRY }}/tickets:${{ github.sha }}
          IMAGE_LATEST=${{ env.YC_REGISTRY }}/tickets:latest
          docker tag "$IMAGE_SHA" "$IMAGE_LATEST"
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

      - name: Build Spring image - Privileges
        working-directory: ./services/privileges
        run: ./gradlew --no-daemon bootBuildImage --imageName=${{ env.YC_REGISTRY }}/privileges:${{ github.sha }}

      - name: Push image - Privileges
        run: |
          IMAGE_SHA=${{ env.YC_REGISTRY }}/privileges:${{ github.sha }}
          IMAGE_LATEST=${{ env.YC_REGISTRY }}/privileges:latest
          docker tag "$IMAGE_SHA" "$IMAGE_LATEST"
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

      - name: Build Spring image - Gateway
        working-directory: ./services/gateway
        run: ./gradlew --no-daemon bootBuildImage --imageName=${{ env.YC_REGISTRY }}/gateway:${{ github.sha }}

      - name: Push image - Gateway
        run: |
          IMAGE_SHA=${{ env.YC_REGISTRY }}/gateway:${{ github.sha }}
          IMAGE_LATEST=${{ env.YC_REGISTRY }}/gateway:latest
          docker tag "$IMAGE_SHA" "$IMAGE_LATEST"
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

      - name: Build Spring image - Identity Provider
        working-directory: ./services/identity-provider
        run: ./gradlew --no-daemon bootBuildImage --imageName=${{ env.YC_REGISTRY }}/identity-provider:${{ github.sha }}

      - name: Push image - Identity Provider
        run: |
          IMAGE_SHA=${{ env.YC_REGISTRY }}/identity-provider:${{ github.sha }}
          IMAGE_LATEST=${{ env.YC_REGISTRY }}/identity-provider:latest
          docker tag "$IMAGE_SHA" "$IMAGE_LATEST"
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

      - name: Build Spring image - Statistics
        working-directory: ./services/statistics
        run: ./gradlew --no-daemon bootBuildImage --imageName=${{ env.YC_REGISTRY }}/statistics:${{ github.sha }}

      - name: Push image - Statistics
        run: |
          IMAGE_SHA=${{ env.YC_REGISTRY }}/statistics:${{ github.sha }}
          IMAGE_LATEST=${{ env.YC_REGISTRY }}/statistics:latest
          docker tag "$IMAGE_SHA" "$IMAGE_LATEST"
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

      - name: Update infrastructure charts
        run: |
          helm upgrade --install postgres ./charts/postgres -n "$KUBE_NAMESPACE"
          helm upgrade --install redpanda ./charts/redpanda -n "$KUBE_NAMESPACE"
          kubectl rollout status statefulset/postgres -n "$KUBE_NAMESPACE" --timeout=2m
          kubectl rollout status statefulset/redpanda -n "$KUBE_NAMESPACE" --timeout=2m

      - name: Update Identity Provider deployment
        run: |
          helm upgrade --install identity-provider ./charts/rsoi -f ./charts/rsoi/values-identity-provider.yaml \
            --set image.tag=${{ github.sha }} \
            -n "$KUBE_NAMESPACE"
          kubectl rollout status deployment/identity-provider -n "$KUBE_NAMESPACE" --timeout=2m

      - name: Update Statistics deployment
        run: |
          helm upgrade --install statistics ./charts/rsoi -f ./charts/rsoi/values-statistics.yaml \
            --set image.tag=${{ github.sha }} \
            -n "$KUBE_NAMESPACE"
          kubectl rollout status deployment/statistics -n "$KUBE_NAMESPACE" --timeout=2m

      - name: Update Flights deployment
        run: |
          helm upgrade --install flights ./charts/rsoi -f ./charts/rsoi/values-flights.yaml \
            --set image.tag=${{ github.sha }} \
            -n "$KUBE_NAMESPACE"
          kubectl rollout status deployment/flights -n "$KUBE_NAMESPACE" --timeout=2m

      - name: Update Tickets deployment
        run: |
          helm upgrade --install tickets ./charts/rsoi -f ./charts/rsoi/values-tickets.yaml \
            --set image.tag=${{ github.sha }} \
            -n "$KUBE_NAMESPACE"
          kubectl rollout status deployment/tickets -n "$KUBE_NAMESPACE" --timeout=2m

      - name: Update Privileges deployment
        run: |
          helm upgrade --install privileges ./charts/rsoi -f ./charts/rsoi/values-privileges.yaml \
            --set image.tag=${{ github.sha }} \
            -n "$KUBE_NAMESPACE"
          kubectl rollout status deployment/privileges -n "$KUBE_NAMESPACE" --timeout=2m

      - name: Update Gateway deployment
        run: |
          helm upgrade --install gateway ./charts/rsoi -f ./charts/rsoi/values-gateway.yaml \
            --set image.tag=${{ github.sha }} \
            -n "$KUBE_NAMESPACE"
          kubectl rollout status deployment/gateway -n "$KUBE_NAMESPACE" --timeout=2m

      - name: Update Frontend deployment
        run: |
          helm upgrade --install frontend ./charts/rsoi -f ./charts/rsoi/values-frontend.yaml \
            --set image.tag=${{ github.sha }} \
            --set auth.issuerUri="${{ vars.VITE_OIDC_AUTHORITY }}" \
            -n "$KUBE_NAMESPACE"
          kubectl rollout status deployment/frontend -n "$KUBE_NAMESPACE" --timeout=2m
