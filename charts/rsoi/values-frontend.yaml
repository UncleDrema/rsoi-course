replicaCount: 1

image:
  repository: "cr.yandex/crpjocodvb4840j8jqg2/frontend"
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []

nameOverride: "frontend"
fullnameOverride: "frontend"

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "frontend"

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: NodePort
  port: 80
  name: http
  annotations:
    gwin.yandex.cloud/targets.type: Node

auth:
  issuerUri: "https://idp.81.26.187.28.nip.io"

env:
  - name: VITE_OIDC_AUTHORITY
    value: "{{ .Values.auth.issuerUri }}"
  - name: VITE_OIDC_CLIENT_ID
    value: "spa-client"
  - name: VITE_API_BASE_PATH
    value: "/api/v1"

ingress:
  enabled: true
  className: "gwin-default"
  annotations:
    gwin.yandex.cloud/groupName: rsoi
    gwin.yandex.cloud/externalIPv4Address: auto
  hosts:
    - host: 81.26.187.28.nip.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - 81.26.187.28.nip.io
      secretName: yc-certmgr-cert-id-fpqpgeqbp2irtdnf11it

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 20
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2

nodeSelector: {}
tolerations: []
affinity: {}
