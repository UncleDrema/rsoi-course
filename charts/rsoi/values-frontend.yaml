replicaCount: 1

image:
  repository: "cr.yandex/crpjocodvb4840j8jqg2/frontend"
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []

nameOverride: "frontend"
fullnameOverride: "frontend"

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "frontend"

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80
  name: http

auth:
  issuerUri: "http://identity-provider:8090"

env:
  - name: VITE_OIDC_AUTHORITY
    value: "{{ .Values.auth.issuerUri }}"
  - name: VITE_OIDC_CLIENT_ID
    value: "spa-client"
  - name: VITE_API_BASE_PATH
    value: "/api/v1"

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: 130.193.57.16.nip.io
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 20
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2

nodeSelector: {}
tolerations: []
affinity: {}
