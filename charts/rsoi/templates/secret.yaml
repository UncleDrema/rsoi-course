{{- if and .Values.auth .Values.auth.clientId .Values.auth.clientSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  labels:
    {{- include "rsoi.labels" . | nindent 4 }}
type: Opaque
data:
  client-id: {{ .Values.auth.clientId | b64enc | quote }}
  client-secret: {{ .Values.auth.clientSecret | b64enc | quote }}
{{- end }}
