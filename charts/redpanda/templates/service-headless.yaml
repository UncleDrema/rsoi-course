apiVersion: v1
kind: Service
metadata:
  name: {{ include "redpanda.fullname" . }}-headless
  labels:
    {{- include "redpanda.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: kafka
      port: {{ .Values.headlessService.port }}
      targetPort: kafka
      protocol: TCP
    - name: admin
      port: {{ .Values.headlessService.adminPort }}
      targetPort: admin
      protocol: TCP
  selector:
    {{- include "redpanda.selectorLabels" . | nindent 4 }}
